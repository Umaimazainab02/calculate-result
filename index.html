<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="first.css">
    <title>Result calculate</title>
</head>

<body class="bg-purple-300">
    <div
        class="flex flex-col lg:flex-row w-70 lg:w-200 h-110 ml-5 lg:ml-90 mt-26 mb-95 lg:mb-0 border-2 border-white rounded-2xl">
        <div
            class="flex items-center flex-col w-69 lg:w-80 h-110 border-4 border-blue-300 bg-blue-300  rounded-t-2xl lg:rounded-l-2xl lg:rounded-tr-none">
            <h1 class="text-3xl font-bold items-center text-white mt-3">
                Result Display </h1>
            <div>
                <button id="name" class="text-md lg:text-xl py-2 px-15 mt-9 border-white border-3 text-black rounded-2xl bg-white">
                   <b> Umaima zainab</b> </button>
            </div>
            <div>
                <button id="roll"
                    class="text-md lg:text-xl  px-14 py-2 mt-4 border-3 border-white rounded-2xl text-black bg-white"><b>Total
                    marks:</b>150 </button>
            </div>
            <div>
                <button id="total"
                    class="text-md lg:text-xl px-15 py-2 mt-5 border-white border-3 text-black rounded-2xl bg-white">
                   <b> Obtain marks:</b> </button>
            </div>
            <button id="average" class="text-md lg:text-xl px-15 py-2 mt-5 border-white border-3 text-black rounded-2xl bg-white">
               <b>Percentage:</b> 
            </button>
            <button id="status"
                class="text-md lg:text-xl px-20 py-2 mb-28 lg:mb-0 mt-6 border-white border-3 text-black rounded-2xl bg-amber-300">
                <b>Status</b></button>
        </div>
        <div class=" flex items-center flex-col justify-center w-69.5 lg:w-130 h-110 pt-8 lg:pt-2 bg-white  rounded-b-2xl        lg:rounded-r-2xl
        lg:rounded-bl-none border-amber-50">
            <div id="" class="flex items-center gap-0 lg:gap-4 ">
                <label for="english" class="text-md lg:text-xl font-semibold">English:</label>
                <input type="number" id="english"
                    class="w-40 lg:w-60 border-2 border-purple-400 rounded-xl ml-5 lg:ml-0  px-1 lg:px-3 py-2 bg-amber-50">
            </div>

            <div id="" class="flex items-center gap-0 lg:gap-4 ">
                <label for="math" class="text-md lg:text-xl font-semibold ml-5">Math:</label>
                <input type="number" id="math"
                    class="w-40 lg:w-60 border-2 border-purple-400 rounded-xl ml-8 lg:ml-0 px-1 lg:px-3 py-2 m-5 bg-amber-50">
            </div>

            <div id="" class="flex items-center gap-0 lg:gap-4 ">
                <label for="computer" class="text-md lg:text-xl ml-4 lg:ml-0 font-semibold ">Computer:</label>
                <input type="number" id="computer"
                    class="w-40 lg:w-60  border-2 border-purple-400 rounded-xl ml-2 lg:ml-0 px-1 lg:px-3 py-2 bg-amber-50 mr-7">
            </div>
            <button id="calculate"
                class="text-xl px-10 py-2 mt-12 ml-2 mb-6 lg:mb-0 text-blue border-3 border-amber-50 rounded-3xl bg-emerald-500 hover:bg-emerald-600 ">Calculte
                result</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>

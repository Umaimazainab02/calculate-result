<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="src/output.css" rel="stylesheet">
    <link rel="stylesheet" href="first.css">
</head>

<body class="bg-purple-300">
    <div
        class="flex flex-col lg:flex-row w-70 lg:w-200 h-100 ml-6 lg:ml-90 mt-30 mb-95 lg:mb-0 border-2 border-white rounded-2xl">
        <div
            class="flex items-center flex-col w-69 lg:w-80 h-100 border-4 border-blue-300 bg-blue-300  rounded-t-2xl lg:rounded-l-2xl lg:rounded-tr-none">
            <h1 class="text-3xl font-bold items-center text-white">
                Result Display </h1>
            <div>
                <h1 class="text-xl font-bold mt-3">Name</h1>
                <input class="text-xl px-2 py-2 mt-1 border-white border-3 text-black rounded-2xl bg-white">
                </input>
            </div>
            <div>
                <h1 class="text-xl font-bold mt-3">Roll no</h1>
                <input class="text-xl  px-3 py-2 mt-1 border-3 border-white rounded-2xl text-black bg-white"></input>
            </div>
            <div>
                <h1 class="text-xl font-bold mt-3">Total marks</h1>
                <input class="text-xl px-3 py-2 mt-1 border-white border-3 text-black rounded-2xl bg-white">
                </input>
            </div>
            <button
                class="text-xl px-20 py-2 mb-8 lg:mb-0 mt-6 border-white border-3 text-black rounded-2xl bg-amber-300">
                Status</button>
        </div>
        <div class="flex items-center flex-col justify-center w-69.5 lg:w-130 h-100 pt-8 lg:pt-2 bg-white  rounded-b-2xl        lg:rounded-r-2xl
        lg:rounded-bl-none border-amber-50">
            <div id="english" class="flex items-center gap-0 lg:gap-4 ">
                <label for="english" class="text-md lg:text-xl font-semibold">English:</label>
                <input type="number" id="english"
                    class="w-40 lg:w-60 border-2 border-purple-400 rounded-xl ml-5 lg:ml-0  px-1 lg:px-3 py-2 bg-amber-50">
            </div>

            <div id="math" class="flex items-center gap-0 lg:gap-4 ">
                <label for="math" class="text-md lg:text-xl font-semibold ml-5">Math:</label>
                <input type="number" id="math"
                    class="w-40 lg:w-60 border-2 border-purple-400 rounded-xl ml-8 lg:ml-0 px-1 lg:px-3 py-2 m-5 bg-amber-50">
            </div>

            <div id="computer" class="flex items-center gap-0 lg:gap-4 ">
                <label for="computer" class="text-md lg:text-xl ml-4 lg:ml-0 font-semibold ">Computer:</label>
                <input type="number" id="computer"
                    class="w-40 lg:w-60  border-2 border-purple-400 rounded-xl ml-2 lg:ml-0 px-1 lg:px-3 py-2 bg-amber-50 mr-7">
            </div>
            <button id="calculate"
                class="text-xl px-10 py-2 mt-12 ml-2 mb-6 lg:mb-0 text-blue border-3 border-amber-50 rounded-3xl bg-emerald-500 hover:bg-emerald-600 ">Calculte
                result</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>

</html>
